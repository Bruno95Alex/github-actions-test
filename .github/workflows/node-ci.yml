name: CI e Testes E2E Firefox

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # schedule:
 #   - cron: '0 * * * *'

permissions:
  contents: read
  actions: write

jobs:
  test-firefox:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Firefox e Dependências
        run: npx playwright install --with-deps firefox

      - name: Rodar Testes no Firefox
        run: npx playwright test --project=firefox

      - name: Upload das Evidências (Prints)
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: evidencias-testes
          path: "**/*.png"
          retention-days: 5