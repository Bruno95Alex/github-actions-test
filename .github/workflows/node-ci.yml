name: CI e Testes E2E Firefox

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 * * * *'

jobs:
  test-firefox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
      #Instalando dependencias
        run: npm ci

      - name: Instalar Firefox e Dependências do Sistema
        run: npx playwright install --with-deps firefox

      - name: Rodar Testes no Firefox
        # O Playwright vai rodar todos os arquivos dentro da pasta /tests
        run: npx playwright test --project=firefox

      - name: Upload das Evidências (Prints)
        uses: actions/upload-artifact@v4
        if: always() # Garante que você terá os prints mesmo se o teste falhar
        with:
          name: evidencias-testes
          # Usamos um "pattern" (*.png) para pegar todos os prints gerados
          path: ./*.png
          retention-days: 5